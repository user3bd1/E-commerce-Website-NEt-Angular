services:
  sql:
    image: mcr.microsoft.com/mssql/server:latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Palestineson123"

    ports:
      - "1433:1433"

    volumes:
      - "sql-data:/var/opt/mssql"

  redis:
    image: "redis:latest"
    ports:
      - "6379:6379"

    volumes:
      - "redis-data:/data"

volumes:
  redis-data:
  sql-data:
