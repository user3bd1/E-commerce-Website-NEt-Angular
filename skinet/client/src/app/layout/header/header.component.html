<!doctype html>
<header class="shadow-md p-3 w-full max-h-20 fixed to-0 z-50 bg-white top-0">
  <div class="flex align-middle items-center justify-between max-w-screen-2xl mx-auto top-full">
    <!--<img src="/images/logo.png" alt="logo" class="max-h-16" />-->
    <nav class="flex gap-3 my-2 uppercase text-xl">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        Home
      </a>
      <a routerLink="/shop" routerLinkActive="active"> Shop </a>
      <a routerLink="/test-error" routerLinkActive="active"> Errors </a>
      <a href=""> Contact </a>
    </nav>
    <div class="flex gap-3 align-middle"></div>
    <a
      routerLink="/cart"
      routerLinkActive="active"
      matBadge="{{ cartService.itemCount() }}"
      matBadgeSize="large"
      class="custom-badge mt-2 mr-2 absolute -right-1/3"
    >
      <mat-icon>shopping_cart</mat-icon>
    </a>
    <button class="absolute -right-1/6" mat-stroked-button>Login</button>
    <button mat-stroked-button>Login</button>
  </div>
</header>

@if (busyService.loading) {
  <mat-progress-bar mode="indeterminate" class="fixed top-20 z-50"></mat-progress-bar>
}
